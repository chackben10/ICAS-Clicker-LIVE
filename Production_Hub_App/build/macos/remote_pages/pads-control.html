<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ICAS Pads Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

<style>
:root {
--bg: #ffffff;
--title-color: #d32f2f;
--status-grey: #666666;

--card-text: #111111;
--border-color: #d0d0d0;

--btn-bg: #ffffff;
--btn-text: #111111;
--btn-border: #d0d0d0;

--btn-invert-bg: #111111;
--btn-invert-text: #ffffff;

--btn-hover-shadow: 0 12px 26px rgba(0,0,0,0.22);
--btn-active-shadow: 0 8px 18px rgba(0,0,0,0.26);

--danger: #ff5252;
--danger-invert-bg: #ffffff;
--danger-invert-text: #ff5252;

--modal-bg: #ffffff;
--modal-shadow: rgba(0,0,0,0.25);
--settings-text: #111111;

--ok: #00c853;

--pads-scale: 1;
}

body.dark {
--bg: #000000;
--title-color: #ff5252;
--status-grey: #888888;

--card-text: #ffffff;
--border-color: #444444;

--btn-bg: #111111;
--btn-text: #ffffff;
--btn-border: #444444;

--btn-invert-bg: #ffffff;
--btn-invert-text: #111111;

--btn-hover-shadow: 0 0 0 2px rgba(255,255,255,0.20), 0 16px 34px rgba(255,255,255,0.18);
--btn-active-shadow: 0 0 0 2px rgba(255,255,255,0.26), 0 12px 26px rgba(255,255,255,0.22);

--danger: #ff5252;
--danger-invert-bg: #ffffff;
--danger-invert-text: #ff5252;

--modal-bg: #111111;
--modal-shadow: rgba(0,0,0,0.6);
--settings-text: #ffffff;

--ok: #00c853;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
}

html {
-webkit-text-size-adjust: 100%;
}

body {
background: var(--bg);
color: var(--card-text);
font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
min-height: 100vh;
display: flex;
justify-content: center;
align-items: flex-start;
padding: 16px;
transition: background 0.25s ease, color 0.25s ease;
-webkit-overflow-scrolling: touch;
touch-action: manipulation;
}

.wrapper {
width: 100%;
max-width: calc(520px * var(--pads-scale));
}

.card {
width: 100%;
background: var(--modal-bg);
color: var(--settings-text);
border-radius: calc(14px * var(--pads-scale));
padding: calc(16px * var(--pads-scale));
box-shadow: 0 18px 40px var(--modal-shadow);
border: 1px solid var(--border-color);
}

.top-row {
display: flex;
align-items: center;
justify-content: space-between;
gap: calc(12px * var(--pads-scale));
margin-bottom: calc(10px * var(--pads-scale));
}

.page-title {
font-size: calc(1.25rem * var(--pads-scale));
font-weight: 900;
color: var(--title-color);
line-height: 1.1;
}

.top-actions {
display: flex;
align-items: center;
gap: 8px;
}

.status-pill {
display: inline-flex;
align-items: center;
gap: 8px;
border: 1px solid var(--border-color);
border-radius: 999px;
padding: calc(7px * var(--pads-scale)) calc(10px * var(--pads-scale));
color: var(--status-grey);
font-size: calc(0.82rem * var(--pads-scale));
font-weight: 900;
white-space: nowrap;
}

.status-dot {
width: calc(10px * var(--pads-scale));
height: calc(10px * var(--pads-scale));
border-radius: 999px;
background: var(--danger);
}

.status-dot.ok {
background: var(--ok);
}

.top-btn {
font-size: calc(0.9rem * var(--pads-scale));
font-weight: 800;
color: var(--btn-text);
opacity: 0.92;
padding: calc(7px * var(--pads-scale)) calc(12px * var(--pads-scale));
border-radius: 999px;
border: 1px solid var(--border-color);
background: transparent;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease, transform 0.10s ease;
}

.top-btn:hover {
opacity: 1;
background: var(--btn-invert-bg);
color: var(--btn-invert-text);
box-shadow: var(--btn-hover-shadow);
}

.top-btn:active {
background: var(--btn-invert-bg);
color: var(--btn-invert-text);
box-shadow: var(--btn-active-shadow);
transform: translateY(1px) scale(0.995);
}

.audio-now-playing {
margin-top: calc(10px * var(--pads-scale));
margin-bottom: calc(12px * var(--pads-scale));
padding: calc(12px * var(--pads-scale)) calc(14px * var(--pads-scale));
border: 1px solid var(--border-color);
border-radius: calc(12px * var(--pads-scale));
background: color-mix(in srgb, var(--bg) 92%, transparent);
color: var(--card-text);
font-size: calc(1.05rem * var(--pads-scale));
font-weight: 900;
line-height: 1.25;
text-align: center;
min-height: calc(46px * var(--pads-scale));

display: flex;
align-items: center;
justify-content: center;
}

.audio-now-playing span {
color: var(--title-color);
}

.segment {
display: flex;
width: 100%;
border: 1px solid var(--border-color);
border-radius: calc(10px * var(--pads-scale));
overflow: hidden;
margin-top: calc(8px * var(--pads-scale));
}

.segment button {
flex: 1;
padding: calc(11px * var(--pads-scale)) calc(6px * var(--pads-scale));
background: transparent;
border: none;
color: var(--settings-text);
cursor: pointer;
font-size: calc(0.9rem * var(--pads-scale));
transition: background 0.15s, color 0.15s;
-webkit-tap-highlight-color: transparent;
font-weight: 900;
touch-action: manipulation;
}

.segment button:hover {
background: rgba(128,128,128,0.12);
}

.segment button.active {
background: #ff5252;
color: white;
font-weight: 900;
}

.audio-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: calc(10px * var(--pads-scale));
margin-bottom: calc(18px * var(--pads-scale));
margin-top: calc(15px * var(--pads-scale));
}

.audio-btn {
padding: calc(15px * var(--pads-scale)) calc(5px * var(--pads-scale));
border: 1px solid var(--border-color);
border-radius: calc(8px * var(--pads-scale));
background: var(--btn-bg);
color: var(--btn-text);
font-weight: 900;
font-size: calc(1rem * var(--pads-scale));
text-align: center;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
user-select: none;
-webkit-user-select: none;
transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease, transform 0.10s ease;
}

.audio-btn:hover {
background: var(--btn-invert-bg);
color: var(--btn-invert-text);
box-shadow: var(--btn-hover-shadow);
}

.audio-btn:active {
background: var(--btn-invert-bg);
color: var(--btn-invert-text);
box-shadow: var(--btn-active-shadow);
transform: translateY(1px) scale(0.95);
}

.audio-clear-btn {
width: 100%;
border: 1px solid color-mix(in srgb, var(--danger) 70%, var(--btn-border));
border-radius: 999px;
background: var(--danger);
color: #ffffff;
font-size: calc(0.95rem * var(--pads-scale));
padding: calc(13px * var(--pads-scale)) 0;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
font-weight: 900;
touch-action: manipulation;
transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease, transform 0.10s ease;
}

.audio-clear-btn:hover {
background: var(--danger-invert-bg);
color: var(--danger-invert-text);
border-color: color-mix(in srgb, var(--danger-invert-text) 45%, var(--btn-border));
box-shadow: var(--btn-hover-shadow);
}

.audio-clear-btn:active {
background: var(--danger-invert-bg);
color: var(--danger-invert-text);
border-color: color-mix(in srgb, var(--danger-invert-text) 55%, var(--btn-border));
box-shadow: var(--btn-active-shadow);
transform: translateY(1px) scale(0.995);
}

.muted-message {
grid-column: span 3;
color: var(--status-grey);
text-align: center;
margin-top: 10px;
font-weight: 800;
}

/* Settings modal */
.settings-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.65);
display: none;
align-items: center;
justify-content: center;
z-index: 999;
padding: 18px;
}

.settings-card {
width: 100%;
max-width: 480px;
background: var(--modal-bg);
color: var(--settings-text);
border-radius: 12px;
padding: 16px;
box-shadow: 0 18px 40px var(--modal-shadow);
border: 1px solid var(--border-color);
transition: background 0.2s ease, color 0.2s ease;
}

.settings-title {
font-size: 1.1rem;
font-weight: 900;
margin-bottom: 12px;
}

.settings-section {
border: 1px solid var(--border-color);
border-radius: 12px;
padding: 12px;
margin-top: 12px;
background: transparent;
}

.settings-label {
font-weight: 900;
margin-bottom: 6px;
}

.settings-muted {
color: var(--status-grey);
font-size: 0.92rem;
line-height: 1.35;
}

.settings-close-btn {
width: 100%;
border: 1px solid var(--border-color);
border-radius: 999px;
background: transparent;
color: var(--settings-text);
font-size: 0.95rem;
padding: 12px 0;
margin-top: 14px;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
font-weight: 900;
touch-action: manipulation;
transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease, transform 0.10s ease;
}

.settings-close-btn:hover {
background: var(--btn-invert-bg);
color: var(--btn-invert-text);
box-shadow: var(--btn-hover-shadow);
}

.settings-close-btn:active {
background: var(--btn-invert-bg);
color: var(--btn-invert-text);
box-shadow: var(--btn-active-shadow);
transform: translateY(1px) scale(0.995);
}

.settings-range {
width: 100%;
margin-top: 8px;
}

.settings-value {
margin-top: 8px;
font-size: 0.9rem;
font-weight: 900;
color: var(--status-grey);
text-align: center;
}

@media (max-width: 420px) {
body {
padding: 10px;
}

.card {
padding: calc(14px * var(--pads-scale));
}

.audio-grid {
grid-template-columns: repeat(2, 1fr);
}

.muted-message {
grid-column: span 2;
}

.page-title {
font-size: calc(1.15rem * var(--pads-scale));
}

.status-pill {
font-size: calc(0.78rem * var(--pads-scale));
padding: calc(6px * var(--pads-scale)) calc(9px * var(--pads-scale));
}

.top-row {
align-items: flex-start;
}

.top-actions {
flex-direction: column;
align-items: flex-end;
gap: 6px;
}
}
</style>
</head>

<body>
<div class="wrapper">
<div class="card">
<div class="top-row">
<div class="page-title">Pads Control</div>

<div class="top-actions">
<div class="status-pill">
<span id="backendDot" class="status-dot"></span>
<span id="backendStatus">Checking…</span>
</div>
<button class="top-btn" id="settingsButton" type="button">Settings</button>
</div>
</div>

<div id="audioNowPlaying" class="audio-now-playing">
Playing:&nbsp;<span id="audioNowPlayingItem">—</span>
</div>

<div class="segment" id="audioPlaylistSegment"></div>

<div id="audioGrid" class="audio-grid"></div>

<button id="btnClearAudio" class="audio-clear-btn" type="button">Clear Ambient Audio</button>
</div>
</div>

<div id="settingsOverlay" class="settings-overlay">
<div class="settings-card">
<div class="settings-title">Settings</div>

<div class="settings-section">
<div class="settings-label">Display Theme</div>
<div class="segment" id="themeSegment">
<button data-mode="light" type="button">Light</button>
<button data-mode="dark" type="button">Dark</button>
<button data-mode="system" type="button">System</button>
</div>
</div>

<div class="settings-section">
<div class="settings-label">Zoom</div>
<div class="settings-muted">Adjust the size of the pads page.</div>
<input class="settings-range" type="range" id="padsZoomSlider" min="70" max="180" step="10">
<div class="settings-value" id="padsZoomValue">100%</div>
</div>

<button id="settingsCloseButton" class="settings-close-btn" type="button">Close</button>
</div>
</div>

<script>
(function () {
const DEFAULT_API_BASE = "https://control.icas-clicker.work";

const THEME_KEY = "icas-theme-mode";
const PADS_ZOOM_KEY = "icas-pads-control-zoom";

function normalizeBase(u) {
u = String(u || "").trim();
return (u || DEFAULT_API_BASE).replace(/\/+$/, "");
}

function getApiBase() {
if (/^https?:$/.test(window.location.protocol) && !/\.?icas-clicker\.work$/i.test(window.location.hostname)) {
return window.location.origin;
}
return normalizeBase(DEFAULT_API_BASE);
}

function endpoints() {
const base = getApiBase();
return {
health: `${base}/health`,
audioPlaylists: `${base}/audio/playlists`,
audioTracks: `${base}/audio/tracks`,
audioTrigger: `${base}/audio/trigger`,
audioClear: `${base}/audio/clear`,
audioActive: `${base}/audio/active`
};
}

const backendDot = document.getElementById("backendDot");
const backendStatus = document.getElementById("backendStatus");

const audioNowPlayingItem = document.getElementById("audioNowPlayingItem");
const audioPlaylistSegment = document.getElementById("audioPlaylistSegment");
const audioGrid = document.getElementById("audioGrid");
const btnClearAudio = document.getElementById("btnClearAudio");

const settingsOverlay = document.getElementById("settingsOverlay");
const settingsButton = document.getElementById("settingsButton");
const settingsCloseButton = document.getElementById("settingsCloseButton");
const padsZoomSlider = document.getElementById("padsZoomSlider");
const padsZoomValue = document.getElementById("padsZoomValue");

function clamp(n, lo, hi) {
return Math.max(lo, Math.min(hi, n));
}

function setBackendStatus(ok, text) {
backendDot.classList.toggle("ok", !!ok);
backendStatus.textContent = text || (ok ? "Connected" : "Offline");
}

function applyTheme(mode) {
if (mode === "light") {
document.body.classList.remove("dark");
} else if (mode === "dark") {
document.body.classList.add("dark");
} else {
if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
document.body.classList.add("dark");
} else {
document.body.classList.remove("dark");
}
}

updateThemeSegmentUI(mode);
}

function updateThemeSegmentUI(mode) {
document.querySelectorAll("#themeSegment button").forEach(btn => {
btn.classList.toggle("active", btn.dataset.mode === mode);
});
}

function loadTheme() {
const stored = localStorage.getItem(THEME_KEY);
applyTheme(stored || "system");
}

window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
const stored = localStorage.getItem(THEME_KEY) || "system";
if (stored === "system") applyTheme("system");
});

document.querySelectorAll("#themeSegment button").forEach(btn => {
btn.addEventListener("click", () => {
const mode = btn.dataset.mode;
localStorage.setItem(THEME_KEY, mode);
applyTheme(mode);
});
});

function getPadsZoomPercent() {
const raw = parseInt(localStorage.getItem(PADS_ZOOM_KEY), 10);
if (Number.isNaN(raw)) return 100;
return clamp(raw, 70, 180);
}

function applyPadsZoom(percent) {
const n = clamp(parseInt(percent, 10) || 100, 70, 180);
const scale = n / 100;

document.documentElement.style.setProperty("--pads-scale", String(scale));

if (padsZoomSlider) padsZoomSlider.value = n;
if (padsZoomValue) padsZoomValue.textContent = `${n}%`;
}

function setPadsZoomPercent(value) {
const n = clamp(parseInt(value, 10) || 100, 70, 180);
localStorage.setItem(PADS_ZOOM_KEY, String(n));
applyPadsZoom(n);
}

if (padsZoomSlider) {
padsZoomSlider.addEventListener("input", () => {
applyPadsZoom(padsZoomSlider.value);
});

padsZoomSlider.addEventListener("change", () => {
setPadsZoomPercent(padsZoomSlider.value);
});
}

function openSettings() {
settingsOverlay.style.display = "flex";
}

function closeSettings() {
settingsOverlay.style.display = "none";
}

if (settingsButton) settingsButton.onclick = openSettings;
if (settingsCloseButton) settingsCloseButton.onclick = closeSettings;

if (settingsOverlay) {
settingsOverlay.addEventListener("click", (e) => {
if (e.target === settingsOverlay) closeSettings();
});
}

async function testBackend() {
const { health } = endpoints();

try {
const res = await fetch(health, { cache: "no-cache" });
if (!res.ok) throw new Error("Bad response");

setBackendStatus(true, "Connected");
return true;
} catch {
setBackendStatus(false, "Offline");
return false;
}
}

function parseActiveAudioItem(text) {
const raw = String(text || "").trim();
if (!raw) return "";

const itemMatch = raw.match(/^item:\s*(.+)$/im);
if (itemMatch && itemMatch[1]) {
return itemMatch[1].trim();
}

return "";
}

async function refreshNowPlayingAudio() {
const { audioActive } = endpoints();

try {
const res = await fetch(audioActive, { cache: "no-cache" });
if (!res.ok) throw new Error("Bad response");

const text = await res.text();
const item = parseActiveAudioItem(text);

audioNowPlayingItem.textContent = item || "—";
} catch {
audioNowPlayingItem.textContent = "—";
}
}

function attachTapHandler(el, handler) {
if (!el) return;

let startX = 0;
let startY = 0;
let moved = false;
let activePointerId = null;
const MOVE_PX = 10;

el.addEventListener("pointerdown", (e) => {
if (el.disabled) return;
if (e.isPrimary === false) return;

activePointerId = e.pointerId;
moved = false;
startX = e.clientX;
startY = e.clientY;

try { el.setPointerCapture(e.pointerId); } catch {}
});

el.addEventListener("pointermove", (e) => {
if (activePointerId === null || e.pointerId !== activePointerId) return;

const dx = Math.abs(e.clientX - startX);
const dy = Math.abs(e.clientY - startY);

if (dx > MOVE_PX || dy > MOVE_PX) moved = true;
});

function finish(e) {
if (activePointerId === null || e.pointerId !== activePointerId) return;

try { el.releasePointerCapture(e.pointerId); } catch {}

const shouldFire = !moved;
activePointerId = null;

if (shouldFire) handler();
}

el.addEventListener("pointerup", finish);
el.addEventListener("pointercancel", () => {
activePointerId = null;
moved = false;
});

el.addEventListener("click", (e) => {
e.preventDefault();
e.stopPropagation();
}, true);
}

window.loadTracks = async (name) => {
const { audioTracks } = endpoints();

try {
const res = await fetch(`${audioTracks}?playlist=${encodeURIComponent(name)}`, {
cache: "no-cache"
});

if (!res.ok) throw new Error("Bad response");

const data = await res.json();
const items = Array.isArray(data?.items) ? data.items : [];

audioGrid.innerHTML = "";

items.forEach(t => {
let clean = String(t || "")
.replace(/\.[^/.]+$/, "")
.replace(/\s*\((Major|minor|nuetral|neutral)\)/gi, "")
.trim();

const btn = document.createElement("div");
btn.className = "audio-btn";
btn.textContent = clean || t;

attachTapHandler(btn, () => window.triggerAudio(name, t));

audioGrid.appendChild(btn);
});

if (items.length === 0) {
audioGrid.innerHTML = "<div class='muted-message'>No tracks found</div>";
}
} catch {
audioGrid.innerHTML = "<div class='muted-message'>Failed to load tracks</div>";
}
};

window.triggerAudio = async (playlist, track) => {
const { audioTrigger } = endpoints();

try {
const res = await fetch(audioTrigger, {
method: "POST",
body: JSON.stringify({ playlist, track }),
headers: { "Content-Type": "application/json" }
});

if (!res.ok) throw new Error("Bad response");

setTimeout(refreshNowPlayingAudio, 300);
} catch (err) {
console.error(err);
}
};

async function loadPlaylists() {
const { audioPlaylists } = endpoints();

try {
const res = await fetch(audioPlaylists, { cache: "no-cache" });
if (!res.ok) throw new Error("Bad response");

const data = await res.json();
const items = Array.isArray(data?.items) ? data.items : [];

audioPlaylistSegment.innerHTML = "";

items.forEach((name, i) => {
const btn = document.createElement("button");

if (i === 0) btn.className = "active";

btn.textContent = name;

attachTapHandler(btn, () => {
audioPlaylistSegment.querySelectorAll("button").forEach(b => b.classList.remove("active"));
btn.classList.add("active");
window.loadTracks(name);
});

audioPlaylistSegment.appendChild(btn);
});

if (items[0]) {
window.loadTracks(items[0]);
} else {
audioGrid.innerHTML = "<div class='muted-message'>No playlists found</div>";
}
} catch {
audioPlaylistSegment.innerHTML = "";
audioGrid.innerHTML = "<div class='muted-message'>Failed to load playlists</div>";
}
}

attachTapHandler(btnClearAudio, async () => {
const { audioClear } = endpoints();

try {
const res = await fetch(audioClear, { method: "POST" });
if (!res.ok) throw new Error("Bad response");

setTimeout(refreshNowPlayingAudio, 300);
} catch (err) {
console.error(err);
}
});

async function init() {
loadTheme();
applyPadsZoom(getPadsZoomPercent());

setBackendStatus(false, "Checking…");

await testBackend();
await refreshNowPlayingAudio();
await loadPlaylists();

setInterval(testBackend, 10000);
setInterval(refreshNowPlayingAudio, 1000);
}

init();
})();
</script>
</body>
</html>
