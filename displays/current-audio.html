<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Current Audio</title>

  <style>
    html,
    body {
      width: 450px;
      height: 80px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
    }

    #audioText {
      width: 450px;
      padding: 0 14px;
      box-sizing: border-box;
      color: #ffffff;
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.65);
    }
  </style>
</head>
<body>
  <div id="audioText"></div>

  <script>
    const AUDIO_ENDPOINT = "/audio/active";
    const POLL_MS = 500;

    const audioText = document.getElementById("audioText");

    function extractItemName(text) {
      const raw = String(text || "").trim();
      if (!raw) return "";

      // Expected Hammerspoon format:
      // playlist: Major Pads
      // item: F(Major)
      const itemMatch = raw.match(/^item:\s*(.+)$/im);
      if (itemMatch && itemMatch[1]) {
        return itemMatch[1].trim();
      }

      // Fallback in case the endpoint is later changed to JSON.
      try {
        const obj = JSON.parse(raw);
        return obj?.item?.name || obj?.item || "";
      } catch (e) {
        return "";
      }
    }

    async function refreshAudio() {
      try {
        const response = await fetch(AUDIO_ENDPOINT, { cache: "no-store" });
        if (!response.ok) {
          audioText.textContent = "";
          return;
        }

        const text = await response.text();
        audioText.textContent = extractItemName(text);
      } catch (e) {
        audioText.textContent = "";
      }
    }

    refreshAudio();
    setInterval(refreshAudio, POLL_MS);
  </script>
</body>
</html>
