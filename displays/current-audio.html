<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Current Audio</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 450px;
      height: 80px;
      overflow: hidden;
      background: transparent;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
    }

    #audioText {
      width: 100%;
      padding: 0 12px;
      box-sizing: border-box;
      text-align: center;
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.65);
    }
  </style>
</head>
<body>
  <div id="audioText"></div>

  <script>
    // This page is hosted online, so this must point back to the LOCAL
    // Hammerspoon server running on the same Mac as ProPresenter/OBS.
    const AUDIO_ENDPOINT = "http://127.0.0.1:1337/audio/active";
    const POLL_MS = 500;

    const audioText = document.getElementById("audioText");

    function extractItemName(text) {
      if (!text) return "";

      const lines = String(text).split(/\r?\n/);

      for (const line of lines) {
        const match = line.match(/^\s*item\s*:\s*(.+?)\s*$/i);
        if (match && match[1]) {
          return match[1].trim();
        }
      }

      return "";
    }

    async function updateAudio() {
      try {
        const response = await fetch(AUDIO_ENDPOINT, {
          method: "GET",
          cache: "no-store"
        });

        if (!response.ok) {
          audioText.textContent = "";
          return;
        }

        const text = await response.text();
        const itemName = extractItemName(text);

        audioText.textContent = itemName || "";
      } catch (err) {
        audioText.textContent = "";
      }
    }

    updateAudio();
    setInterval(updateAudio, POLL_MS);
  </script>
</body>
</html>
