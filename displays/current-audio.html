<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Current Audio</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000000;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
}

#audioText {
  width: 100vw;
  max-width: 450px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #ffffff;
  font-weight: 800;
  font-size: clamp(22px, 8vw, 52px);
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 10px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.45);
}
</style>
</head>

<body>
<div id="audioText"></div>

<script>
(function () {
  // Same backend pattern as control.html
  const DEFAULT_API_BASE = "https://control.icas-clicker.work";

  const POLL_MS = 500;
  const audioText = document.getElementById("audioText");

  function normalizeBase(u) {
    u = String(u || "").trim();
    return (u || DEFAULT_API_BASE).replace(/\/+$/, "");
  }

  function getApiBase() {
    return normalizeBase(DEFAULT_API_BASE);
  }

  function endpoints() {
    const base = getApiBase();
    return {
      audioActive: `${base}/audio/active`
    };
  }

  function extractItemName(text) {
    text = String(text || "").trim();
    if (!text || /^no audio playing$/i.test(text)) return "";

    // Expected Hammerspoon response:
    // playlist: Major Pads
    // item: F(Major)
    const match = text.match(/^item:\s*(.+)$/im);
    if (match && match[1]) return match[1].trim();

    return "";
  }

  async function refreshCurrentAudio() {
    const { audioActive } = endpoints();

    try {
      const res = await fetch(audioActive, { cache: "no-cache" });
      if (!res.ok) throw new Error("Bad response");

      const body = await res.text();
      const itemName = extractItemName(body);
      audioText.textContent = itemName;
    } catch (err) {
      // Keep the display clean/transparent if backend is unavailable.
      audioText.textContent = "";
    }
  }

  refreshCurrentAudio();
  setInterval(refreshCurrentAudio, POLL_MS);
})();
</script>
</body>
</html>
