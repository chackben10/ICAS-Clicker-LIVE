<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Prize Wheel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+Malayalam:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-light: #1a1a1a;
            --gold: #D4AF37;
            --dark-grey: #333333;
            --light-grey: #E0E0E0;
            --accent-blue: #00A8FF;
            --text-dark: #111111;
            --text-light: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle, var(--bg-light) 0%, var(--bg-dark) 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-light);
        }

        #app-container {
            position: relative;
            display: flex;
            flex-direction: column; 
            align-items: center;
            width: 100vw;
            height: 100vh;
            justify-content: center;
            gap: 6vmin;
        }

        @media (orientation: landscape) {
            #app-container {
                flex-direction: row;
                gap: 10vmin;
            }
        }

        #wheel-wrapper {
            position: relative;
            width: 80vmin; 
            height: 80vmin;
            max-width: 800px;
            max-height: 800px;
            filter: drop-shadow(0 2vmin 4vmin rgba(0,0,0,0.8));
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 0.8vmin solid #555; 
        }

        #wheel-wrapper::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8%;
            height: 8%;
            background: #555;
            border-radius: 50%;
            border: 0.4vmin solid var(--bg-dark);
            box-shadow: inset 0 0.3vmin 0.5vmin rgba(0,0,0,0.5);
        }

        .flapper {
            position: absolute;
            top: -3vmin;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 2.5vmin solid transparent;
            border-right: 2.5vmin solid transparent;
            border-top: 5.5vmin solid var(--accent-blue);
            z-index: 10;
            filter: drop-shadow(0 0.4vmin 0.6vmin rgba(0,0,0,0.5));
            transform-origin: top center;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #spin-btn {
            padding: 2vmin 6vmin;
            font-size: max(24px, 3vmin);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background-color: var(--accent-blue);
            color: var(--text-light);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 168, 255, 0.3);
            transition: all 0.2s ease;
        }

        #spin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 168, 255, 0.4);
        }

        #spin-btn:active {
            transform: translateY(2px);
            box-shadow: 0 5px 10px rgba(0, 168, 255, 0.3);
        }

        #spin-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #refresh-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.4);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        #refresh-btn:hover {
            color: var(--text-light);
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1);
        }

        #modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100;
        }

        #modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: #1e1e1e;
            border: 2px solid var(--gold);
            padding: 5vmin;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 90%;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #modal-overlay.active .modal-card {
            transform: scale(1);
        }

        #modal-english {
            font-size: max(28px, 4vmin);
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        #modal-malayalam {
            font-family: 'Noto Sans Malayalam', sans-serif;
            font-size: max(20px, 3vmin);
            color: var(--text-light);
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-close, .btn-remove {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-close {
            background: transparent;
            border: 2px solid #555;
            color: #aaa;
        }
        
        .btn-close:hover {
            border-color: #888;
            color: #fff;
        }

        .btn-remove {
            background: var(--accent-blue);
            border: none;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 168, 255, 0.3);
        }

        .btn-remove:hover {
            background: #0088cc;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="wheel-wrapper">
            <div class="flapper" id="flapper"></div>
            <canvas id="wheel" width="1000" height="1000"></canvas>
        </div>
        
        <div class="controls">
            <button id="spin-btn">SPIN</button>
        </div>
        
        <button id="refresh-btn">Reset & Reload</button>

        <div id="modal-overlay">
            <div class="modal-card">
                <div id="modal-english">Loading...</div>
                <div id="modal-malayalam">à´²àµà´¡àµ à´àµà´¯àµà´¯àµà´¨àµà´¨àµ...</div>
                <div class="modal-buttons">
                    <button class="btn-close" id="btn-close">Close</button>
                    <button class="btn-remove" id="btn-remove">Remove & Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const palette = ["#D4AF37", "#333333", "#E0E0E0"]; 
        const textColors = ["#111111", "#FFFFFF", "#111111"]; 

        let wheelItems = [];
        
        const WHEEL_RADIUS = 500;
        const OUTER_RADIUS = WHEEL_RADIUS - 15;
        const DRAW_WIDTH = OUTER_RADIUS * 0.75; 
        const INNER_RADIUS = OUTER_RADIUS - DRAW_WIDTH;

        const wheelCache = document.createElement('canvas');
        wheelCache.width = 1000;
        wheelCache.height = 1000;
        const cacheCtx = wheelCache.getContext('2d', { alpha: false });

        function initData() {
            const saved = localStorage.getItem('churchWheelData');
            if (saved) {
                wheelItems = JSON.parse(saved);
                updateTextCanvases();
                renderWheelToCache(); 
                drawWheel(); 
            } else {
                fetch('wheel_data.json')
                    .then(response => {
                        if (!response.ok) throw new Error('Network response was not ok');
                        return response.json();
                    })
                    .then(data => {
                        wheelItems = data;
                        if(wheelItems.length === 0) wheelItems = [{ id: "empty", english: "Empty Wheel", malayalam: "à´à´àµà´°à´ à´¶àµà´¨àµà´¯à´®à´¾à´£àµ" }];
                        saveData();
                        updateTextCanvases();
                        renderWheelToCache(); 
                        drawWheel();
                    })
                    .catch(error => {
                        console.error("Error loading wheel_data.json:", error);
                        wheelItems = [{ id: "error", english: "Fetch Error! Check console.", malayalam: "à´¡à´¾à´±àµà´± à´ªà´¿à´¶à´àµ" }];
                        updateTextCanvases();
                        renderWheelToCache(); 
                        drawWheel();
                    });
            }
        }

        function saveData() {
            localStorage.setItem('churchWheelData', JSON.stringify(wheelItems));
        }

        function updateTextCanvases() {
            const numSlices = wheelItems.length;
            if (numSlices === 0) return;
            
            const sliceAngle = (2 * Math.PI) / numSlices;
            const safeAngle = (sliceAngle / 2) * 0.85; 
            const idealRatio = Math.log(OUTER_RADIUS / INNER_RADIUS) / (2 * Math.tan(safeAngle));

            for (let i = 0; i < numSlices; i++) {
                let colorIndex = i % palette.length;
                if (i === numSlices - 1 && colorIndex === 0 && numSlices > 1) {
                    colorIndex = 1; 
                }
                let textColor = textColors[colorIndex];
                wheelItems[i].textData = createTextCanvas(wheelItems[i].english, textColor, idealRatio);
            }
        }

        function createTextCanvas(text, color, idealRatio) {
            const c = document.createElement('canvas');
            const targetHeight = 800;
            const targetWidth = targetHeight * idealRatio;
            
            c.width = targetWidth; 
            c.height = targetHeight;
            const ctx = c.getContext('2d');
            
            ctx.fillStyle = color;
            ctx.textAlign = 'right'; 
            ctx.textBaseline = 'middle';
            
            let fontSize = 200; 
            let lines = [];
            
            const maxWidth = targetWidth * 0.95; 
            const maxHeight = targetHeight * 0.95; 
            
            while (fontSize > 10) {
                ctx.font = `bold ${fontSize}px Inter`;
                const words = text.split(' ');
                let line = '';
                lines = [];
                
                for (let i = 0; i < words.length; i++) {
                    let testLine = line + words[i] + ' ';
                    if (ctx.measureText(testLine).width > maxWidth && i > 0) {
                        lines.push(line.trim());
                        line = words[i] + ' ';
                    } else {
                        line = testLine;
                    }
                }
                lines.push(line.trim());
                
                let actualWidth = 0;
                for (let i = 0; i < lines.length; i++) {
                    let w = ctx.measureText(lines[i]).width;
                    if (w > actualWidth) actualWidth = w;
                }
                
                let totalHeight = lines.length * (fontSize * 1.15);
                
                if (actualWidth <= maxWidth && totalHeight <= maxHeight) {
                    break;
                }
                fontSize -= 4;
            }
            
            const lineHeight = fontSize * 1.15;
            const totalHeight = lines.length * lineHeight;
            let startY = (c.height / 2) - (totalHeight / 2) + (fontSize / 2);
            
            const rightPadding = targetWidth * 0.02; 
            
            for (let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], targetWidth - rightPadding, startY + (i * lineHeight));
            }
            
            return { canvas: c, width: targetWidth, height: targetHeight };
        }

        function renderWheelToCache() {
            cacheCtx.clearRect(0, 0, wheelCache.width, wheelCache.height);
            const numSlices = wheelItems.length;
            if (numSlices === 0) return;
            
            const cX = wheelCache.width / 2;
            const cY = wheelCache.height / 2;
            const sliceAngle = (2 * Math.PI) / numSlices;
            const safeAngle = (sliceAngle / 2) * 0.85;

            for (let i = 0; i < numSlices; i++) {
                const startAngle = i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                let colorIndex = i % palette.length;
                if (i === numSlices - 1 && colorIndex === 0 && numSlices > 1) {
                    colorIndex = 1; 
                }

                cacheCtx.beginPath();
                cacheCtx.moveTo(cX, cY);
                cacheCtx.arc(cX, cY, WHEEL_RADIUS, startAngle, endAngle);
                cacheCtx.fillStyle = palette[colorIndex];
                cacheCtx.fill();

                if (wheelItems[i].textData) {
                    cacheCtx.save();
                    cacheCtx.translate(cX, cY);
                    cacheCtx.rotate(startAngle + sliceAngle / 2);

                    const textData = wheelItems[i].textData;
                    const img = textData.canvas;
                    const W_s = textData.width;
                    
                    const logInner = Math.log(INNER_RADIUS);
                    const logOuter = Math.log(OUTER_RADIUS);
                    const logDiff = logOuter - logInner;
                    
                    const stripWidth = 1.5; 

                    for (let dx = 0; dx < DRAW_WIDTH; dx += stripWidth) {
                        let actualX = INNER_RADIUS + dx;
                        let nextActualX = Math.min(actualX + stripWidth, OUTER_RADIUS);
                        
                        let wedgeHeight = 2 * actualX * Math.tan(safeAngle); 
                        
                        let t1 = (Math.log(actualX) - logInner) / logDiff;
                        let t2 = (Math.log(nextActualX) - logInner) / logDiff;
                        
                        let sourceX = t1 * W_s;
                        let sWidth = (t2 - t1) * W_s;
                        
                        if (sourceX < 0) sourceX = 0;
                        if (sWidth <= 0) sWidth = 0.1;
                        
                        cacheCtx.drawImage(
                            img, 
                            sourceX, 0, sWidth, img.height, 
                            actualX, -wedgeHeight / 2, (nextActualX - actualX) + 0.5, wedgeHeight 
                        );
                    }
                    cacheCtx.restore();
                }
            }
        }

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        let currentRotation = 0; 

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(currentRotation);
            ctx.drawImage(wheelCache, -centerX, -centerY);
            ctx.restore();
        }


        // --- Upgraded Dynamic Audio Engine ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 1. Add a Master Compressor
        // When many sounds play rapidly, their amplitudes sum together causing digital clipping (distortion/cutting out).
        // This compressor safely squashes peaks before they hit the speakers.
        const masterCompressor = audioCtx.createDynamicsCompressor();
        masterCompressor.threshold.setValueAtTime(-24, audioCtx.currentTime);
        masterCompressor.knee.setValueAtTime(30, audioCtx.currentTime);
        masterCompressor.ratio.setValueAtTime(12, audioCtx.currentTime);
        masterCompressor.attack.setValueAtTime(0.003, audioCtx.currentTime);
        masterCompressor.release.setValueAtTime(0.25, audioCtx.currentTime);
        masterCompressor.connect(audioCtx.destination);

        function playTick(speedRatio) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // speedRatio is 1 at max speed, 0 at completely stopped.
            // Inverting it (1 - speedRatio) allows us to create dynamic drama!
            const inverseSpeed = 1 - speedRatio; 

            // Fast spins = very short clicks (10ms). Slow spins = ringing thuds (50ms).
            const duration = 0.01 + (0.04 * inverseSpeed); 
            
            // Fast spins = quiet (0.05). Slow spins = loud (0.35).
            const volume = 0.05 + (0.30 * inverseSpeed);

            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(400 + (200 * speedRatio), audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            // Connect to compressor instead of directly to destination
            gainNode.connect(masterCompressor); 
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        let isSpinning = false;
        let velocity = 0;
        let lastTickSlice = -1;
        let animationFrame;
        let flapperAngle = 0;

        const flapper = document.getElementById('flapper');
        const spinBtn = document.getElementById('spin-btn');

        function spin() {
            if (isSpinning || wheelItems.length === 0 || wheelItems[0].id === 'error') return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            isSpinning = true;
            spinBtn.disabled = true;
            
            velocity = 0.4 + Math.random() * 0.3; 
            lastTickSlice = -1;
            animate();
        }

        function animate() {
            velocity *= 0.993; 

            let topAngle = (3 * Math.PI / 2) - currentRotation;
            while (topAngle < 0) topAngle += 2 * Math.PI;
            while (topAngle >= 2 * Math.PI) topAngle -= 2 * Math.PI;

            const numSlices = wheelItems.length;
            const sliceAngle = (2 * Math.PI) / numSlices;
            const currentSliceIndex = Math.floor(topAngle / sliceAngle);

            let distanceToPeg = topAngle - (currentSliceIndex * sliceAngle);
            const engagementZone = 0.08; 

            if (distanceToPeg < engagementZone) {
                let deflection = 1 - (distanceToPeg / engagementZone);
                flapperAngle = -40 * deflection; 
                let springForce = 0.0007 * deflection;
                velocity -= springForce;
            } else {
                flapperAngle *= 0.5; 
            }

            if (currentSliceIndex !== lastTickSlice) {
                if (lastTickSlice !== -1 && distanceToPeg > engagementZone) {
                    let speedRatio = Math.min(1, velocity / 0.1);
                    playTick(speedRatio);
                    flapperAngle = 20; 
                }
                lastTickSlice = currentSliceIndex;
            }

            currentRotation += velocity;
            if (currentRotation >= 2 * Math.PI) currentRotation %= 2 * Math.PI;

            flapper.style.transform = `translateX(-50%) rotate(${flapperAngle}deg)`;

            if (velocity <= 0) {
                velocity = 0;
                isSpinning = false;
                spinBtn.disabled = false;
                cancelAnimationFrame(animationFrame);
                resolveWinner();
                return; 
            }

            drawWheel();
            animationFrame = requestAnimationFrame(animate);
        }

        let currentWinnerIndex = -1;

        function resolveWinner() {
            const numSlices = wheelItems.length;
            const sliceAngle = (2 * Math.PI) / numSlices;
            
            let topAngle = (3 * Math.PI / 2) - currentRotation;
            if (topAngle < 0) topAngle += 2 * Math.PI;
            
            currentWinnerIndex = Math.floor(topAngle / sliceAngle);
            const winner = wheelItems[currentWinnerIndex];

            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#D4AF37', '#E0E0E0', '#00A8FF'],
                zIndex: 200
            });

            setTimeout(() => {
                document.getElementById('modal-english').innerText = winner.english;
                document.getElementById('modal-malayalam').innerText = winner.malayalam;
                document.getElementById('modal-overlay').classList.add('active');
            }, 500);
        }

        document.getElementById('btn-close').addEventListener('click', () => {
            document.getElementById('modal-overlay').classList.remove('active');
        });

        document.getElementById('btn-remove').addEventListener('click', () => {
            if (currentWinnerIndex !== -1) {
                wheelItems.splice(currentWinnerIndex, 1);
                saveData();
                updateTextCanvases(); 
                renderWheelToCache(); 
                drawWheel();
            }
            document.getElementById('modal-overlay').classList.remove('active');
        });

        spinBtn.addEventListener('click', spin);

        document.getElementById('refresh-btn').addEventListener('click', () => {
            if(confirm("Are you sure you want to reset the wheel? This will re-fetch from the JSON and bring back all items.")) {
                localStorage.removeItem('churchWheelData');
                location.reload();
            }
        });

        initData();

    </script>
</body>
</html>
