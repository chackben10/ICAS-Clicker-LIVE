<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ICAS Media Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

  <style>
    :root {
      --bg: #ffffff;
      --title-color: #d32f2f;
      --status-grey: #666666;
      --card-bg: #f3f3f3;
      --card-text: #111111;
      --border-color: #d0d0d0;
      --btn-bg: #ffffff;
      --btn-text: #111111;
      --btn-border: #d0d0d0;
      --btn-invert-bg: #111111;
      --btn-invert-text: #ffffff;
      --btn-hover-shadow: 0 12px 26px rgba(0,0,0,0.22);
      --btn-active-shadow: 0 8px 18px rgba(0,0,0,0.26);
      --danger: #ff5252;
      --danger-invert-bg: #ffffff;
      --danger-invert-text: #ff5252;
      --modal-bg: #ffffff;
      --modal-shadow: rgba(0,0,0,0.25);
      --settings-text: #111;
      --ok: #00c853;
      
      --btn-scale: 1; 
      --grid-gap-base: 10px;
    }

    body.dark {
      --bg: #000000;
      --title-color: #ff5252;
      --status-grey: #888888;
      --card-bg: #121212;
      --card-text: #ffffff;
      --border-color: #444444;
      --btn-bg: #111111;
      --btn-text: #ffffff;
      --btn-border: #444444;
      --btn-invert-bg: #ffffff;
      --btn-invert-text: #111111;
      --btn-hover-shadow: 0 0 0 2px rgba(255,255,255,0.20), 0 16px 34px rgba(255,255,255,0.18);
      --btn-active-shadow: 0 0 0 2px rgba(255,255,255,0.26), 0 12px 26px rgba(255,255,255,0.22);
      --danger: #ff5252;
      --danger-invert-bg: #ffffff;
      --danger-invert-text: #ff5252;
      --modal-bg: #111111;
      --modal-shadow: rgba(0,0,0,0.6);
      --settings-text: #ffffff;
      --ok: #00c853;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--card-text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 12px;
      transition: background 0.25s ease, color 0.25s ease;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
    }

    .wrapper { width: 100%; max-width: 800px; padding: 16px; }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      gap: 12px;
    }

    .page-title { font-size: 1.15rem; font-weight: 600; color: var(--status-grey); }

    .top-btn {
      font-size: 0.9rem; font-weight: 500; color: var(--btn-text); opacity: 0.9;
      padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border-color);
      background: transparent; cursor: pointer; transition: all 0.15s ease;
    }

    .top-btn:hover { background: var(--btn-invert-bg); color: var(--btn-invert-text); box-shadow: var(--btn-hover-shadow); }

    .panel-title { color: var(--title-color); font-size: 1.45rem; font-weight: 800; margin: 6px 0 8px; }

    .desc { color: var(--status-grey); font-size: 0.98rem; line-height: 1.35; margin-bottom: 12px; }

    .grid { display: grid; grid-template-columns: 1fr; gap: calc(var(--grid-gap-base) * var(--btn-scale)); margin-top: 12px; }
    @media (min-width: 700px) { .grid { grid-template-columns: 1fr 1fr; } }

    .preset-card { width: 100%; display: flex; flex-direction: column; height: 100%; }
    
    .preset-main, .preset-addon {
      width: 100%; text-align: left; border: 1px solid var(--btn-border); background: var(--btn-bg);
      color: var(--btn-text); cursor: pointer; position: relative; transition: all 0.15s ease;
    }

    .preset-main { padding: calc(14px * var(--btn-scale)); border-radius: calc(12px * var(--btn-scale)); flex: 1 1 auto; display: flex; flex-direction: column; }
    .preset-card.has-addon .preset-main { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom-width: 0; }
    .preset-addon { padding: calc(14px * var(--btn-scale)); border-radius: calc(12px * var(--btn-scale)); border-top-left-radius: 0; border-top-right-radius: 0; text-align: center; font-size: calc(1.05rem * var(--btn-scale)); font-weight: 900; }

    .preset-main:hover, .preset-addon:hover { background: var(--btn-invert-bg); color: var(--btn-invert-text); box-shadow: var(--btn-hover-shadow); }
    .preset-main:active, .preset-addon:active { transform: translateY(1px) scale(0.995); box-shadow: var(--btn-active-shadow); }

    .preset-title { font-size: calc(1.15rem * var(--btn-scale)); font-weight: 900; margin-bottom: calc(6px * var(--btn-scale)); line-height: 1.15; }
    .preset-sub { color: var(--status-grey); font-size: calc(0.95rem * var(--btn-scale)); line-height: 1.25; }

    .select-wrap { position: relative; width: 100%; margin-top: calc(10px * var(--btn-scale)); }
    .select { 
      width: 100%; border: 1px solid var(--border-color); background: color-mix(in srgb, var(--bg) 92%, transparent); 
      color: var(--card-text); border-radius: calc(10px * var(--btn-scale)); 
      padding: calc(10px * var(--btn-scale)); font-weight: 800; font-size: calc(1rem * var(--btn-scale));
      -webkit-appearance: none; appearance: none; 
    }
    .select-wrap::after { content: "▾"; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; font-weight: 900; }

    .danger-fill { background: var(--danger); color: #ffffff; }
    .danger-fill:hover { background: var(--danger-invert-bg); color: var(--danger-invert-text); }

    /* Modals */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; z-index: 999; padding: 18px; }
    .modal-card { width: 100%; max-width: 480px; background: var(--modal-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border-color); box-shadow: 0 20px 40px var(--modal-shadow); color: var(--settings-text); }
    
    .settings-section { border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; margin-top: 12px; }
    .settings-label { font-weight: 900; margin-bottom: 6px; }
    .settings-muted { color: var(--status-grey); font-size: 0.92rem; line-height: 1.35; }

    .segment { display: flex; border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; margin-top: 8px; }
    .segment button { flex: 1; padding: 10px; background: transparent; border: none; color: var(--settings-text); font-weight: 900; cursor: pointer; transition: 0.1s; }
    .segment button.active { background: var(--danger); color: white; }

    .audio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; margin-top: 15px; }
    .audio-btn { padding: 15px 5px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--btn-bg); color: var(--btn-text); font-weight: 900; font-size: 1.1rem; text-align: center; cursor: pointer; }
    .audio-btn:active { transform: scale(0.95); background: var(--btn-invert-bg); color: var(--btn-invert-text); }

    .settings-close-btn { width: 100%; border: 1px solid var(--border-color); border-radius: 999px; background: transparent; color: var(--settings-text); font-size: 1rem; padding: 14px; margin-top: 10px; cursor: pointer; font-weight: 900; }

    .pill { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--border-color); border-radius: 999px; padding: 8px 12px; color: var(--status-grey); font-size: 0.92rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 999px; background: var(--danger); }
    .status-dot.ok { background: var(--ok); }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="top-row">
      <div class="page-title">ICAS Media Control Panel</div>
      <button class="top-btn" id="settingsButton">Settings</button>
    </div>

    <div id="presetsHeader">
      <div class="panel-title">Presets</div>
      <div class="desc">Trigger ProPresenter + OBS actions simultaneously.</div>
    </div>

    <div class="grid">
      <div class="preset-card"><button class="preset-main" id="btnStreamBeginning"><div class="preset-title">Stream Beginning</div><div class="preset-sub">Sets Starting Announcements and Stream Start scene.</div></button></div>
      <div class="preset-card has-addon"><button class="preset-main" id="btnCamera"><div class="preset-title">Camera</div><div class="preset-sub">Sets PTZ Camera on both systems.</div></button><button class="preset-addon danger-fill" id="btnCameraSafeClear">Camera + Safely Clear Slide</button></div>
      <div class="preset-card has-addon"><button class="preset-main" id="btnServiceLogo"><div class="preset-title">Service Logo</div><div class="preset-sub" id="serviceLogoDesc">Sets logo and Audience Camera.</div><div class="select-wrap"><select id="serviceLogoSelect" class="select"></select></div></button><button class="preset-addon danger-fill" id="btnServiceLogoSafeClear">Logo + Safely Clear Slide</button></div>
      <div class="preset-card"><button class="preset-main" id="btnShowSlides"><div class="preset-title">Show Slides</div><div class="preset-sub">Clears Announcements and sets ProPresenter Input.</div></button></div>
      <div class="preset-card"><button class="preset-main" id="btnTestimonies"><div class="preset-title">Testimonies</div><div class="preset-sub" id="testimoniesDesc">Sets logo and Testimonies scene.</div><div class="select-wrap"><select id="testimoniesLogoSelect" class="select"></select></div></button></div>
      <div class="preset-card"><button class="preset-main" id="btnEndingStream"><div class="preset-title">Ending Stream</div><div class="preset-sub">Sets Ending Announcements and Thanks Screen.</div></button></div>
      <div class="preset-card"><button class="preset-main" id="btnSetMacro"><div class="preset-title">Set Macro</div><div class="preset-sub" id="macroDesc">Triggers Look Macro.</div><div class="select-wrap"><select id="macroSelect" class="select"></select></div></button></div>
      <div class="preset-card"><button class="preset-main danger-fill" id="btnSafelyClearSlide"><div class="preset-title">Safely Clear Slide</div><div class="preset-sub">Clear ProPresenter without affecting OBS stream.</div></button></div>
      <div class="preset-card"><button class="preset-main" id="btnAudioControl"><div class="preset-title">Control Background Pads Audio</div><div class="preset-sub">Open pad controller to play ambient drones.</div></button></div>
      <div class="preset-card"><button class="preset-main" id="btnNSCSetup"><div class="preset-title">NSC setup</div><div class="preset-sub">Display iMac screen on all in-house TVs.</div></button></div>
    </div>
  </div>

  <div id="audioOverlay" class="overlay">
    <div class="modal-card">
      <div class="panel-title" style="margin-top:0;">Ambient Pads</div>
      <div class="segment" id="audioPlaylistSegment"></div>
      <div id="audioGrid" class="audio-grid"></div>
      <button class="preset-main danger-fill" id="btnClearAudio" style="margin-bottom:10px; border-radius:8px; text-align:center;"><div class="preset-title" style="margin:0;">Clear Ambient Audio</div></button>
      <button id="audioCloseButton" class="settings-close-btn">Close</button>
    </div>
  </div>

  <div id="settingsOverlay" class="overlay">
    <div class="modal-card">
      <div class="panel-title">Settings</div>
      
      <div class="settings-section">
        <div class="settings-label">Backend Status</div>
        <div class="pill"><span id="backendDot" class="status-dot"></span><span id="backendStatus">Checking…</span></div>
        <div style="margin-top:10px; font-size: 0.9rem;"><span id="lastAction">Last action: —</span></div>
      </div>

      <div class="settings-section">
        <div class="settings-label">Zoom & Scale</div>
        <input type="range" id="btnTextSizeSlider" min="50" max="150" step="5" style="width:100%;">
      </div>

      <div class="settings-section">
        <div class="settings-label">Display Theme</div>
        <div class="segment" id="themeSegment">
          <button data-mode="light">Light</button>
          <button data-mode="dark">Dark</button>
          <button data-mode="system">System</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">Show Description</div>
        <label style="display:flex; align-items:center; cursor:pointer;">
          <input id="showDescToggle" type="checkbox" style="width:20px; height:20px; margin-right:10px;">
          <span style="font-weight:900;">Show Presets Header</span>
        </label>
      </div>

      <button class="settings-close-btn" id="refreshLogosBtn" style="margin-top:20px;">Refresh Data</button>
      <button id="settingsCloseButton" class="settings-close-btn">Close</button>
    </div>
  </div>

  <script>
    (function () {
      const DEFAULT_API_BASE = "https://control.icas-clicker.work";
      const API = {
        health: `${DEFAULT_API_BASE}/health`,
        logos: `${DEFAULT_API_BASE}/service_logos`,
        macros: `${DEFAULT_API_BASE}/macros`,
        macro: `${DEFAULT_API_BASE}/macro`,
        preset: `${DEFAULT_API_BASE}/preset`,
        audioPlaylists: `${DEFAULT_API_BASE}/audio/playlists`,
        audioTracks: `${DEFAULT_API_BASE}/audio/tracks`,
        audioTrigger: `${DEFAULT_API_BASE}/audio/trigger`,
        audioClear: `${DEFAULT_API_BASE}/audio/clear`
      };

      const SERVICE_LOGO_KEY = "icas-service-logo-uuid";
      const TESTIMONIES_LOGO_KEY = "icas-testimonies-logo-uuid";
      const MACRO_NAME_KEY = "icas-macro-name";
      const ZOOM_KEY = "icas-panel-zoom";
      const THEME_KEY = "icas-theme-mode";
      const SHOW_DESC_KEY = "icas-show-desc";

      // ====== THEME LOGIC ======
      function applyTheme(mode) {
        localStorage.setItem(THEME_KEY, mode);
        document.querySelectorAll("#themeSegment button").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
        
        const isDark = (mode === "dark") || (mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.body.classList.toggle("dark", isDark);
      }

      document.querySelectorAll("#themeSegment button").forEach(btn => {
        btn.onclick = () => applyTheme(btn.dataset.mode);
      });

      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
        if (localStorage.getItem(THEME_KEY) === "system") applyTheme("system");
      });

      // ====== ZOOM & DESC LOGIC ======
      const zoomSlider = document.getElementById("btnTextSizeSlider");
      const descToggle = document.getElementById("showDescToggle");

      function applyZoom(val) {
        document.documentElement.style.setProperty("--btn-scale", val / 100);
        localStorage.setItem(ZOOM_KEY, val);
      }
      zoomSlider.oninput = (e) => applyZoom(e.target.value);

      descToggle.onchange = (e) => {
        document.getElementById("presetsHeader").style.display = e.target.checked ? "block" : "none";
        localStorage.setItem(SHOW_DESC_KEY, e.target.checked ? "1" : "0");
      };

      // ====== TAP HANDLER ======
      function attachTapHandler(el, handler) {
        if (!el) return;
        let startX = 0, startY = 0, moved = false, activePointerId = null;
        el.addEventListener("pointerdown", (e) => {
          if (el.disabled) return;
          activePointerId = e.pointerId; moved = false;
          startX = e.clientX; startY = e.clientY;
          try { el.setPointerCapture(e.pointerId); } catch {}
        });
        el.addEventListener("pointermove", (e) => {
          if (activePointerId === null || e.pointerId !== activePointerId) return;
          if (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10) moved = true;
        });
        el.addEventListener("pointerup", (e) => {
          if (activePointerId === null || e.pointerId !== activePointerId) return;
          try { el.releasePointerCapture(e.pointerId); } catch {}
          if (!moved) handler();
          activePointerId = null;
        });
      }

      function setLastAction(text) { document.getElementById("lastAction").textContent = `Last action: ${text}`; }

      function syncDescriptions() {
        const sName = document.getElementById("serviceLogoSelect").selectedOptions[0]?.text || "—";
        const tName = document.getElementById("testimoniesLogoSelect").selectedOptions[0]?.text || "—";
        const mName = document.getElementById("macroSelect").selectedOptions[0]?.text || "—";
        document.getElementById("serviceLogoDesc").innerHTML = `Sets ProPresenter Announcement to <b>${sName}</b>, and shows the <b>Audience Camera</b> on OBS.`;
        document.getElementById("testimoniesDesc").innerHTML = `Sets ProPresenter Announcement to <b>${tName}</b> and sets OBS scene to <b>Testimonies</b>.`;
        document.getElementById("macroDesc").innerHTML = `Triggers ProPresenter Macro: <b>${mName}</b>.`;
      }

      async function testBackend() {
        try {
          const res = await fetch(API.health);
          const ok = res.ok;
          document.getElementById("backendDot").classList.toggle("ok", ok);
          document.getElementById("backendStatus").textContent = ok ? "Connected ✔" : "Offline";
          return ok;
        } catch { return false; }
      }

      async function refreshData() {
        const ok = await testBackend();
        if (!ok) return;
        try {
          const res = await fetch(API.logos);
          const data = await res.json();
          [document.getElementById("serviceLogoSelect"), document.getElementById("testimoniesLogoSelect")].forEach((sel, i) => {
            const key = i === 0 ? SERVICE_LOGO_KEY : TESTIMONIES_LOGO_KEY;
            const prev = localStorage.getItem(key);
            sel.innerHTML = data.items.map(it => `<option value="${it.uuid}">${it.name}</option>`).join("");
            if (prev) sel.value = prev;
            else localStorage.setItem(key, sel.value);
          });
        } catch {}
        try {
          const res = await fetch(API.macros);
          const data = await res.json();
          const sel = document.getElementById("macroSelect");
          const prev = localStorage.getItem(MACRO_NAME_KEY);
          sel.innerHTML = data.items.map(it => `<option value="${it.name}">${it.name}</option>`).join("");
          if (prev) sel.value = prev;
        } catch {}
        syncDescriptions();
      }

      // ====== AUDIO NAME CLEANING ======
      window.loadTracks = async (name) => {
        try {
          const res = await fetch(`${API.audioTracks}?playlist=${encodeURIComponent(name)}`);
          const data = await res.json();
          document.getElementById("audioGrid").innerHTML = data.items.map(t => {
            let clean = t.replace(/\.[^/.]+$/, "");
            clean = clean.replace(/\s*\((Major|minor|nuetral|neutral)\)/gi, "").trim();
            return `<div class="audio-btn" onclick="window.triggerAudio('${name}','${t}')">${clean}</div>`;
          }).join("");
        } catch {}
      };

      window.triggerAudio = async (playlist, track) => {
        setLastAction(`Playing Pad: ${track}`);
        await fetch(API.audioTrigger, { method: "POST", body: JSON.stringify({ playlist, track }), headers: {"Content-Type": "application/json"}});
      };

      async function runPreset(name, extra = {}) {
        setLastAction(`Running: ${name}`);
        const payload = { preset: name, ...extra };
        if (name === "service_logo") payload.service_logo_uuid = localStorage.getItem(SERVICE_LOGO_KEY);
        if (name === "testimonies") payload.service_logo_uuid = localStorage.getItem(TESTIMONIES_LOGO_KEY);
        try {
          await fetch(API.preset, { method: "POST", body: JSON.stringify(payload), headers: {"Content-Type": "application/json"}});
          setLastAction(`Done: ${name}`);
        } catch { setLastAction(`Failed: ${name}`); }
      }

      // Event handlers
      attachTapHandler(document.getElementById("btnStreamBeginning"), () => runPreset("stream_beginning"));
      attachTapHandler(document.getElementById("btnCamera"), () => runPreset("camera"));
      attachTapHandler(document.getElementById("btnCameraSafeClear"), () => fetch(API.preset + "?safeclear=true", { method: "POST", body: JSON.stringify({ preset: "camera" }), headers: {"Content-Type": "application/json"}}));
      attachTapHandler(document.getElementById("btnServiceLogo"), () => runPreset("service_logo"));
      attachTapHandler(document.getElementById("btnServiceLogoSafeClear"), () => fetch(API.preset + "?safeclear=true", { method: "POST", body: JSON.stringify({ preset: "service_logo", service_logo_uuid: localStorage.getItem(SERVICE_LOGO_KEY) }), headers: {"Content-Type": "application/json"}}));
      attachTapHandler(document.getElementById("btnShowSlides"), () => runPreset("show_slides"));
      attachTapHandler(document.getElementById("btnTestimonies"), () => runPreset("testimonies"));
      attachTapHandler(document.getElementById("btnEndingStream"), () => runPreset("ending_stream"));
      attachTapHandler(document.getElementById("btnSafelyClearSlide"), () => runPreset("safely_clear_slide"));
      attachTapHandler(document.getElementById("btnNSCSetup"), () => runPreset("nsc_setup"));
      attachTapHandler(document.getElementById("btnSetMacro"), async () => {
        const name = localStorage.getItem(MACRO_NAME_KEY);
        await fetch(API.macro, { method: "POST", body: JSON.stringify({ name }), headers: {"Content-Type": "application/json"}});
      });

      document.getElementById("btnAudioControl").onclick = () => { 
        document.getElementById("audioOverlay").style.display = "flex"; 
        fetch(API.audioPlaylists).then(r => r.json()).then(data => {
          document.getElementById("audioPlaylistSegment").innerHTML = data.items.map((name, i) => `<button class="${i===0?'active':''}" onclick="this.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));this.classList.add('active');window.loadTracks('${name}')">${name}</button>`).join("");
          if (data.items[0]) window.loadTracks(data.items[0]);
        });
      };
      
      document.getElementById("audioCloseButton").onclick = () => document.getElementById("audioOverlay").style.display = "none";
      document.getElementById("btnClearAudio").onclick = () => fetch(API.audioClear, { method: "POST" });
      document.getElementById("settingsButton").onclick = () => document.getElementById("settingsOverlay").style.display = "flex";
      document.getElementById("settingsCloseButton").onclick = () => document.getElementById("settingsOverlay").style.display = "none";
      document.getElementById("refreshLogosBtn").onclick = () => refreshData();

      document.getElementById("serviceLogoSelect").onchange = (e) => { localStorage.setItem(SERVICE_LOGO_KEY, e.target.value); syncDescriptions(); };
      document.getElementById("testimoniesLogoSelect").onchange = (e) => { localStorage.setItem(TESTIMONIES_LOGO_KEY, e.target.value); syncDescriptions(); };
      document.getElementById("macroSelect").onchange = (e) => { localStorage.setItem(MACRO_NAME_KEY, e.target.value); syncDescriptions(); };

      // Initialize Settings
      applyTheme(localStorage.getItem(THEME_KEY) || "system");
      applyZoom(localStorage.getItem(ZOOM_KEY) || 100);
      zoomSlider.value = localStorage.getItem(ZOOM_KEY) || 100;
      
      const showD = localStorage.getItem(SHOW_DESC_KEY) !== "0";
      descToggle.checked = showD;
      document.getElementById("presetsHeader").style.display = showD ? "block" : "none";

      refreshData();
      setInterval(refreshData, 10000);
    })();
  </script>
</body>
</html>
